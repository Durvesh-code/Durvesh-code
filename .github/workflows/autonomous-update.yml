- name: Execute System Log Injection
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: repos } = await github.rest.repos.listForUser({
              username: owner,
              sort: 'updated',
              per_page: 3
            });

            let logContent = '```json\n[\n';
            let entries = [];

            for (const r of repos) {
              const { data: commits } = await github.rest.repos.listCommits({
                owner: owner,
                repo: r.name,
                per_page: 1
              }).catch(() => ({ data: [] }));
              
              const latestCommit = commits[0]?.commit?.message?.split('\n')[0].replace(/"/g, '\\"') || "Automated system sync";
              const syncDate = new Date(r.pushed_at).toISOString().replace('.000Z', 'Z');

              entries.push(`  {\n    "module": "${r.name}",\n    "last_sync": "${syncDate}",\n    "latest_operation": "${latestCommit}"\n  }`);
            }

            logContent += entries.join(',\n') + '\n]\n```';
            
            let logEntry = '### 📡 `telemetry_stream()`\n\n' + logContent + '\n';

            const fs = require('fs');
            const readmePath = 'README.md';
            let readme = fs.readFileSync(readmePath, 'utf8');

            const startTag = '<!-- SYSTEM_LOG:START -->';
            const endTag = '<!-- SYSTEM_LOG:END -->';
            const regex = new RegExp(`${startTag}[\\s\\S]*?${endTag}`, 'g');

            readme = readme.replace(regex, `${startTag}\n${logEntry}\n${endTag}`);
            fs.writeFileSync(readmePath, readme);
